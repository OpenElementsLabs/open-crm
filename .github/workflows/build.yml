name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          # Generates ~/.m2/settings.xml so the 'github' repository in
          # backend/pom.xml can pull the spring-services 1.0.0-SNAPSHOT
          # artifact (spec 107) from GitHub Packages.
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - run: ./mvnw clean verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          # pnpm/action-setup runs from the repo root, not the job's
          # working-directory, so point it at the frontend package.json
          # for the packageManager field.
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: "frontend/.nvmrc" # reads Node version from .nvmrc
          cache: "pnpm"
          cache-dependency-path: "frontend/pnpm-lock.yaml"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      # Forwarded into the backend Docker build so Maven can resolve
      # com.open-elements:spring-services:1.0.0-SNAPSHOT from GitHub
      # Packages (spec 107). docker-compose.yml reads the same vars.
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Build backend Docker image
        run: |
          docker build \
            --build-arg GITHUB_ACTOR \
            --build-arg GITHUB_TOKEN \
            -t crm-backend ./backend
      - name: Build frontend Docker image
        run: docker build -t crm-frontend ./frontend
      - name: Test Docker Compose
        run: docker compose build
