server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/opencrm}
    username: ${SPRING_DATASOURCE_USERNAME:opencrm}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${OIDC_JWK_SET_URI:http://localhost:8888/default/jwks}

translation:
  api-url: ${TRANSLATION_API_URL:}
  api-key: ${TRANSLATION_API_KEY:}
  model: ${TRANSLATION_MODEL:}

openelements:
  meilisearch:
    host: ${MEILI_HOST:http://localhost:7700}
    master-key: ${MEILI_MASTER_KEY:local-dev-master-key}
    index-prefix: ${MEILI_INDEX_PREFIX:crm_}
    request-timeout: 5s
  mcp:
    # Master switch for the MCP server (spec 108). Off by default: enabling it
    # exposes personal CRM data to external MCP clients and grants every existing
    # API key full read access. Turn on deliberately per environment, after the
    # Phase-1 GDPR checklist is satisfied. See docs/specs/108-mcp-connector/.
    enabled: ${MCP_ENABLED:false}
    server-name: "Open CRM"
    server-version: "0.1.0"
    default-page-size: 20
    max-page-size: 50
    auth:
      api-key:
        enabled: ${MCP_AUTH_API_KEY_ENABLED:true}   # Phase 1 — Onyx via X-API-Key
      oidc:
        enabled: ${MCP_AUTH_OIDC_ENABLED:false}      # Phase 2 — Claude via Authentik OIDC
